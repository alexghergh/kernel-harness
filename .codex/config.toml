personality = "pragmatic"
# default maintainer setting; solver sessions get their own runtime copy and the launcher
# keeps workspace-write as the default sandbox mode unless overridden explicitly
sandbox_mode = "workspace-write"
web_search = "live"
project_doc_max_bytes = 65536
model_auto_compact_token_limit = 240000

[agents]
max_threads = 6
max_depth = 1

[sandbox_workspace_write]
network_access = false

[tools]
web_search = { context_size = "low", allowed_domains = ["docs.nvidia.com"] }
